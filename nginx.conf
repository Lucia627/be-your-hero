# Be Your Hero - Nginx 反向代理配置
# 复制到 /etc/nginx/sites-available/be-your-hero 后启用

server {
    listen 80;
    server_name _;  # 改为你的域名，如 be-your-hero.com

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # 静态资源缓存
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|css|js|woff|woff2)$ {
        root /opt/be-your-hero/frontend;
        expires 1d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 和动态请求 -> Node.js
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持 (PvP 对战)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 日志
    access_log /var/log/nginx/be-your-hero.access.log;
    error_log /var/log/nginx/be-your-hero.error.log;
}
